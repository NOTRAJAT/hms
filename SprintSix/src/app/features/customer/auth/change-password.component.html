<section class="mx-auto max-w-xl px-6 py-10">
  <div class="app-card p-8">
    <p class="text-xs font-semibold uppercase tracking-widest text-amber-800/70">Security Update</p>
    <h1 class="mt-2 text-3xl font-semibold">Change Password</h1>
    <p class="mt-2 text-sm app-subtitle">You must change your temporary password before continuing.</p>

    <form class="mt-6 space-y-4" [formGroup]="form" (ngSubmit)="submit()">
      <div>
        <label class="text-sm font-medium">Current Password</label>
        <input type="password" class="mt-1 w-full rounded-xl border border-stone-300 px-4 py-2" formControlName="currentPassword" />
      </div>

      <div>
        <label class="text-sm font-medium">New Password</label>
        <input type="password" class="mt-1 w-full rounded-xl border border-stone-300 px-4 py-2" formControlName="newPassword" />
        <p class="mt-1 text-xs text-rose-700" *ngIf="form.controls.newPassword.touched && newPasswordWeak">
          Password must be 8+ chars with uppercase, lowercase, number, and special character.
        </p>
      </div>

      <div>
        <label class="text-sm font-medium">Confirm New Password</label>
        <input type="password" class="mt-1 w-full rounded-xl border border-stone-300 px-4 py-2" formControlName="confirmPassword" />
        <p class="mt-1 text-xs text-rose-700" *ngIf="form.controls.confirmPassword.touched && passwordMismatch">
          Passwords do not match.
        </p>
      </div>

      <p class="text-sm text-rose-700" *ngIf="errorMessage">{{ errorMessage }}</p>
      <p class="text-sm text-emerald-700" *ngIf="successMessage">{{ successMessage }}</p>

      <button type="submit" class="app-button px-5 py-2" [disabled]="isSubmitting || form.invalid || passwordMismatch || newPasswordWeak">
        {{ isSubmitting ? 'Updating...' : 'Update Password' }}
      </button>
    </form>
  </div>
</section>
