<section class="mx-auto max-w-xl px-6 py-10 md:py-14">
  <div class="app-card app-hero-card app-animate-enter p-8 md:p-10">
    <p class="text-xs font-semibold uppercase tracking-[0.22em] text-[var(--ink-muted)]">Customer Access</p>
    <h1 class="mt-3 text-4xl font-semibold md:text-5xl">Welcome Back</h1>
    <p class="mt-3 text-sm leading-6 app-subtitle">Sign in to continue with your bookings and account.</p>

    <form class="mt-6 space-y-4" [formGroup]="form" (ngSubmit)="submit()">
      <div>
        <label class="app-label" for="username">Username</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          class="mt-1 app-input"
          placeholder="janedoe"
        />
        <p *ngIf="form.get('username')?.touched && form.get('username')?.invalid" class="mt-1 text-xs text-rose-600">
          Username is required.
        </p>
      </div>

      <div>
        <label class="app-label" for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="mt-1 app-input"
        />
        <p *ngIf="form.get('password')?.touched && form.get('password')?.invalid" class="mt-1 text-xs text-rose-600">
          Password is required.
        </p>
      </div>

      <p *ngIf="errorMessage" class="rounded-lg border border-rose-200 bg-[var(--danger-bg)] px-3 py-2 text-sm text-rose-700">
        {{ errorMessage }}
      </p>

      <button
        type="submit"
        [disabled]="form.invalid || isSubmitting"
        class="w-full app-button"
      >
        Login
      </button>

      <div class="flex flex-wrap items-center justify-between gap-3 text-sm">
        <a routerLink="/password-reset" class="text-[var(--clay-deep)] hover:underline">Forgot Password?</a>
        <a routerLink="/register" class="text-[var(--clay-deep)] hover:underline">Register Now</a>
      </div>
    </form>
  </div>
</section>
