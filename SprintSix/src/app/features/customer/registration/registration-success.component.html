<section class="mx-auto max-w-2xl px-6 py-10">
  <div class="app-card border-emerald-200 bg-emerald-50/70 p-8">
    <h1 class="text-3xl font-semibold text-emerald-900">Registration Successful!</h1>

    <div *ngIf="result as data; else missing" class="mt-4 space-y-2 text-sm text-emerald-900">
      <p><span class="font-semibold">User ID:</span> {{ data.userId }}</p>
      <p><span class="font-semibold">Customer Name:</span> {{ data.name }}</p>
      <p><span class="font-semibold">Email:</span> {{ data.email }}</p>
    </div>

    <ng-template #missing>
      <p class="mt-4 text-sm text-emerald-900">
        Your registration details are not available. Please return to the registration page.
      </p>
    </ng-template>

    <div class="mt-6 flex flex-wrap gap-3">
      <a routerLink="/login" class="app-button bg-emerald-700 hover:bg-emerald-800">
        Login Now
      </a>
      <a routerLink="/register" class="app-button-outline border-emerald-200 text-emerald-900">
        Back to Registration
      </a>
    </div>
  </div>
</section>
