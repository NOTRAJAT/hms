<section class="mx-auto max-w-xl px-6 py-10">
  <div class="app-card p-8">
    <p class="text-xs font-semibold uppercase tracking-widest text-amber-800/70">Admin / Staff Access</p>
    <h1 class="mt-2 text-3xl font-semibold">Admin / Staff Login</h1>
    <p class="mt-2 text-sm app-subtitle">Use admin or staff credentials to access management tools.</p>

    <form class="mt-6 space-y-4" [formGroup]="form" (ngSubmit)="submit()">
      <div>
        <label class="text-sm font-medium">Username</label>
        <input type="text" class="mt-1 w-full rounded-xl border border-stone-300 px-4 py-2" formControlName="username" />
      </div>

      <div>
        <label class="text-sm font-medium">Password</label>
        <input type="password" class="mt-1 w-full rounded-xl border border-stone-300 px-4 py-2" formControlName="password" />
      </div>

      <p class="text-sm text-rose-700" *ngIf="errorMessage">{{ errorMessage }}</p>

      <div class="flex flex-wrap items-center gap-3 pt-2">
        <button type="submit" class="app-button px-5 py-2" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Signing In...' : 'Sign In' }}
        </button>
        <a
          routerLink="/login"
          class="inline-flex items-center justify-center rounded-lg border border-amber-200 bg-amber-50 px-4 py-2 text-sm font-medium text-amber-800 transition hover:bg-amber-100"
        >
          Customer Login
        </a>
      </div>
    </form>
  </div>
</section>
